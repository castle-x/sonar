root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server/"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "site/node_modules", "site/dist", "data", "bin"]
  include_ext = ["go"]
  exclude_regex = ["_test\\.go"]
  kill_delay = "0s"
  send_interrupt = true

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
