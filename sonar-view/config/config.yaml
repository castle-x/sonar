# sonar-view 配置文件

# 服务监听地址
addr: ":8283"

# sonar-store 连接配置
store:
  addr: "localhost:8082"
  app_id: ""   # 留空表示聚合所有 app

# 聚合配置
aggregation:
  enabled: true
  collect_timeout: 12s
  query_delay: 40s
  # 级联聚合级别配置（与 monitor_hub 一致，首次启动会写入 SQLite，之后可通过 API 动态修改）
  # 如果 SQLite 中已有数据，config.yaml 的 levels 会在首次 seed 时写入，不会覆盖已修改的配置
  levels:
    - name: "15s"
      interval: 15s
      retention: 30m
      source: "raw"
      min_points: 1
      fallback_mode: "skip"
      description: "实时监控级别：原始数据15秒聚合，保留30分钟"
    - name: "1m"
      interval: 1m
      retention: 2h
      source: "15s"
      min_points: 4
      fallback_mode: "partial"
      description: "短期分析级别：1分钟聚合，保留2小时"
    - name: "5m"
      interval: 5m
      retention: 12h
      source: "1m"
      min_points: 5
      fallback_mode: "partial"
      description: "当日分析级别：5分钟聚合，保留12小时"
    - name: "30m"
      interval: 30m
      retention: 24h
      source: "5m"
      min_points: 6
      fallback_mode: "partial"
      description: "近期趋势级别：30分钟聚合，保留24小时"
    - name: "1h"
      interval: 1h
      retention: 7d
      source: "30m"
      min_points: 2
      fallback_mode: "skip"
      description: "周级历史级别：1小时聚合，保留7天"
    - name: "6h"
      interval: 6h
      retention: 30d
      source: "1h"
      min_points: 6
      fallback_mode: "skip"
      description: "月级历史级别：6小时聚合，保留30天"

# TSDB 存储配置
tsdb:
  data_dir: "data/tsdb"
  retention_days: 7
  write_buffer_size: 512
  max_chunk_size: 536870912  # 512MB
  block_duration: 2h
  max_block_duration: 36h
  compaction_interval: 1h
  cleanup_interval: 10m

# MongoDB 配置（已被 SQLite 替代，保留供历史参考）
mongodb:
  uri: "mongodb://localhost:27017"
  db_name: "sonar_view"
  enable: false

# SQLite 配置（快照持久化使用）
sqlite:
  path: "./data/sonar-view.db"
  enable: true
