# vrm监控配置备份 - load服
# 全局配置
step: 15  # 采集间隔（秒）

# 推送网关配置
push_gateway:
  app_id: "vrm"       # 应用ID
  enabled: true                # 是否开启推送
  host: "http://0.0.0.0:5000"         # 推送网关地址
  req_timeout: 10                       # 请求超时时间（秒）
  report_interval: 10                   # 上报间隔（秒）
  buf_size: 1000                        # 缓冲大小
  print_metrics: true                   # 是否打印指标日志
  channel_size: 10000                   # 通道大小
  labels:                               # 全局标签
    cluster: "joy_cvm_load_gs"
    region: "shanghai"

# 进程监控配置
process_exporter:
  enabled: true                         # 是否开启进程监控
  dynamic_interval: 15                  # 动态刷新间隔（秒），0代表不开启
  rules:                                # 进程匹配规则
    - name: "base_server"           # 进程名称（用于标识）
      cmdlines:                         # 过滤规则
        - "-conf_file=../cfg/server.yaml"                       # 包含conf_file=../cfg/server.yaml
      extracts:       
        - type: "regex"
          pattern: "-so_file=./(\\w+).so"
          labels:
            gs_type: $1 # 直接提取
  
# 节点监控配置  
node_exporter:
  enabled: true                         # 是否开启节点监控