log_config:
  - name: "GangstarServerForProcessCmdline" # 从进程命令行参数获取日志路径，这种可以采样运行时的进程日志数据，并且能够将pid注入到label中，形成进场和日志数据的关联
    enabled: true
    encoding: "utf-8"
    read_mode: "head"
    time_zone: "Asia/Shanghai"
    dynamic_interval: 15                      # 动态刷新进程列表的间隔（秒），用于检测新增或退出的进程
    rules:                                    # 进程匹配规则(参考node_process_exporter的配置)
    - name: "GangstarServer"                 # 进程名称
      cmdlines: ["RobotServer","!ds_seed"]          # 过滤进程的命令行参数，!代表反选
      log_path_pattern: "-ABSLOG=(.+\\.log)"  # 从cmdlines中提取日志路径的正则表达式
      extracts:                               # 提取默认标签
        - type: "regex"
          pattern: "\\s-([^\\s=?]+)"
          labels:
            ds_type: $1 # 直接提取

    - name: "GangstarServer-Linux-Shipping"   # shipping包进程名              
      cmdlines: ["RobotServer","!ds_seed"]          
      log_path_pattern: "-ABSLOG=(.+\\.log)"  
      extracts:                               
        - type: "regex"
          pattern: "\\s-([^\\s=?]+)"
          labels:
            ds_type: $1 # 直接提取

    metrics:
      - name: "slow_fps"
        timestamp_format: "2006.01.02-15.04.05:000"
        timestamp: "$1"
        help: "Dedicated server slow FPS events"
        pattern: "\\[(\\d{4}\\.\\d{2}\\.\\d{2}-\\d{2}\\.\\d{2}\\.\\d{2}:\\d{3})\\]\\[.*?\\]LogDedicatedServer: 1 World, Frame: \\d+ slow at only (\\d+\\.?\\d*) FPS"
        value: "$2"
        enabled: true
        density: 0 

      - name: "online_player"
        timestamp_format: "2006.01.02-15.04.05:000"
        timestamp: "$1"
        help: "Dedicated server online players"
        pattern: "\\[(\\d{4}\\.\\d{2}\\.\\d{2}-\\d{2}\\.\\d{2}\\.\\d{2}:\\d{3})\\]\\[.*?\\]LogDedicatedServer: \\{.*?\"NbPlayers\":(\\d+)"
        value: "$2"
        enabled: true
        density: 1 

      - name: "avg_fps"
        timestamp_format: "2006.01.02-15.04.05:000"
        timestamp: "$1"
        help: "Dedicated server avg fps"
        pattern: "\\[(\\d{4}\\.\\d{2}\\.\\d{2}-\\d{2}\\.\\d{2}\\.\\d{2}:\\d{3})\\]\\[.*?\\]LogDedicatedServer: \\{.*?\"AvgFPS\":(\\d+)"
        value: "$2"
        enabled: true
        density: 1 

      - name: "npc"
        timestamp_format: "2006.01.02-15.04.05:000"
        timestamp: "$1"
        help: "Dedicated server NPC Total"
        pattern: "\\[(\\d{4}\\.\\d{2}\\.\\d{2}-\\d{2}\\.\\d{2}\\.\\d{2}:\\d{3})\\]\\[.*?\\]LogWorldStatistic: Verbose: World Statistic NPC (Total)/Managed/Cop/ESU: (\\d+)/\\d+/\\d+/\\d+"
        value: "$3"
        labels:
          type: "$2"
        enabled: true
        density: 1 

      - name: "npc"
        timestamp_format: "2006.01.02-15.04.05:000"
        timestamp: "$1"
        help: "Dedicated server NPC Total"
        pattern: "\\[(\\d{4}\\.\\d{2}\\.\\d{2}-\\d{2}\\.\\d{2}\\.\\d{2}:\\d{3})\\]\\[.*?\\]LogWorldStatistic: Verbose: World Statistic NPC (Total)/Managed/Cop/ESU: (\\d+)/\\d+/\\d+/\\d+"
