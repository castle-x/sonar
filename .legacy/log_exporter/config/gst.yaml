push_gateway:
  app_id: "gstm"       # 应用ID
  enabled: false                         # 是否开启推送
  host: "http://124.222.179.251:5000"         # 推送网关地址
  req_timeout: 10                       # 请求超时时间（秒）
  report_interval: 10                   # 上报间隔（秒）
  buf_size: 4096                        # 缓冲大小
  print_metrics: true                   # 是否打印指标日志
  channel_size: 10000                   # 通道大小
  labels:                               # 全局标签
    cluster: "stresstest2"