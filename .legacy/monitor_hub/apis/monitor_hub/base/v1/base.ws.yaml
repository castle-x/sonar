# ============================================
# WebSocket 基础协议定义（类 Thrift 风格）
# ============================================
# 定义所有 WebSocket 服务通用的基础结构
# 类似 base.thrift，提供可复用的基础类型
# ============================================

namespace: go monitor_hub.base.v1

# ============================================
# 基础结构体定义
# ============================================
enum:
  - name: TriggerType
    description: "触发类型"
    values:
      - name: Interval
        value: "interval"
      - name: Cron
        value: "cron"
      - name: Event
        value: "event"
      - name: Once
        value: "once"

structs:
  # ============================================
  # 传输层包装器（Envelope）
  # ============================================
  # 所有 WebSocket 消息的统一包装格式
  # 包含路由信息和业务数据
  # ============================================
  
  - name: WsEnvelope
    description: "WebSocket 消息包装器（传输层统一格式）"
    fields:
      - id: 1
        name: type
        type: string
        required: true
        description: "消息类型：request/response/broadcast/heartbeat"
        tags:
          go: 'json:"type"'
        example: "request"
      
      - id: 2
        name: topic
        type: string
        required: false
        description: "资源主题（用于路由前缀和广播目标）"
        tags:
          go: 'json:"topic,omitempty"'
        example: "datasource.status"
      
      - id: 3
        name: path
        type: string
        required: false
        description: "操作路径（相对于 topic 的路径）"
        tags:
          go: 'json:"path,omitempty"'
        example: "/subscribe"
      
      - id: 4
        name: request_id
        type: string
        required: false
        description: "请求ID（可选，用于匹配请求和响应）"
        tags:
          go: 'json:"request_id,omitempty"'
        example: "req-123"
      
      - id: 5
        name: data
        type: binary
        required: false
        description: "业务数据（JSON 格式，由业务层定义具体结构）"
        tags:
          go: 'json:"data,omitempty"'
      
      - id: 6
        name: timestamp
        type: int64
        required: true
        description: "消息时间戳（Unix 时间戳，毫秒）"
        tags:
          go: 'json:"timestamp"'

  # ============================================
  # 通用响应数据（Response Data）
  # ============================================
  # 用于 request 的响应确认
  # ============================================
  
  - name: WsResponse
    description: "通用响应数据（用于 request 的响应确认）"
    fields:
      - id: 1
        name: code
        type: int32
        required: true
        description: "响应码：0=成功，非0=失败"
        tags:
          go: 'json:"code"'
        example: 0
      
      - id: 2
        name: message
        type: string
        required: true
        description: "响应描述"
        tags:
          go: 'json:"message"'
        example: "操作成功"
      
      - id: 3
        name: details
        type: string
        required: false
        description: "详细信息（可选）"
        tags:
          go: 'json:"details,omitempty"'
      
      - id: 4
        name: data
        type: any
        required: false
        description: "响应业务数据（可选，JSON 格式）"
        tags:
          go: 'json:"data,omitempty"'

  # ============================================
  # 心跳数据（Heartbeat Data）
  # ============================================
  # 用于 ping/pong 心跳检测
  # ============================================
  
  - name: WsHeartbeat
    description: "心跳数据（用于 ping/pong 心跳检测）"
    fields:
      - id: 1
        name: client_time
        type: int64
        required: true
        description: "客户端时间戳（Unix 时间戳，毫秒）"
        tags:
          go: 'json:"client_time"'
      
      - id: 2
        name: server_time
        type: int64
        required: false
        description: "服务端时间戳（pong 时填充，ping 时为 0）"
        tags:
          go: 'json:"server_time,omitempty"'

  - name: BroadcastOption
    description: "广播选项"
    fields:
      - id: 1
        name: topic
        type: string
        required: true
        description: "主题"
        tags:
          go: 'json:"topic"'

      - id: 2
        name: interval
        type: string
        required: true
        description: "间隔"
        tags:
          go: 'json:"interval"'

      - id: 3
        name: trigger_type
        type: TriggerType
        required: true
        description: "触发类型"
        tags:
          go: 'json:"trigger_type"'

      - id: 4
        name: cron
        type: string
        required: false
        description: "cron 表达式"
        tags:
          go: 'json:"cron,omitempty"'

      - id: 5
        name: once_delay
        type: string

      - id: 6
        name: event_name
        type: string
        required: false
        description: "事件名称"
        tags:
          go: 'json:"event_name,omitempty"'

      - id: 7
        name: method
        type: string
        required: true
        description: "方法"
        tags:
          go: 'json:"method"'
      
      - id: 8
        name: event_buffer_size
        type: int
        required: true
        description: "事件缓冲区大小"
        tags:
          go: 'json:"event_buffer_size"'