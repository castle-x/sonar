addr: ":8082"

storage:
  data_dir: "./data"
  retention_days: 7
  write_buffer_size: 4096
  compaction_interval_sec: 3600
  cleanup_interval_sec: 3600
  min_block_duration_sec: 7200
  max_block_duration_sec: 86400
  max_chunk_size_mb: 512

tap:
  stale_timeout_sec: 300
  cleanup_interval_sec: 60
  cleanup_after_sec: 3600
